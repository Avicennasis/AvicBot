name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8 bandit

      - name: Lint
        run: flake8 --max-line-length 120 --exclude __pycache__ .

      - name: Security scan
        run: bandit -r . --exclude ./.git -s B603,B404,B101
